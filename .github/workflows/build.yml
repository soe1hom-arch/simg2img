name: build

on:
  push:
    branches: [main]
    tags: ["*"]
  pull_request:
    branches: [main]

jobs:
  # Quick build check on every push
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: "1.22"
      - run: go build -o /dev/null .
      - run: go vet ./...

  # Full multi-platform build on tags
  release:
    if: startsWith(github.ref, 'refs/tags/')
    runs-on: ubuntu-latest
    strategy:
      matrix:
        goos: [linux, darwin, windows]
        goarch: [amd64, arm64]
        exclude:
          - goos: darwin
            goarch: arm64
        include:
          - goos: darwin
            goarch: arm64
          - goos: darwin
            goarch: amd64
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: "1.22"

      - name: Build
        env:
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
          CGO_ENABLED: 0
        run: |
          ext=""
          [ "$GOOS" = "windows" ] && ext=".exe"
          name="simg2img-${{ matrix.goos }}-${{ matrix.goarch }}${ext}"
          go build -ldflags="-s -w" -o "$name" .
          echo "binary=$name" >> $GITHUB_ENV

      - name: Upload binary
        uses: actions/upload-artifact@v4
        with:
          name: simg2img-${{ matrix.goos }}-${{ matrix.goarch }}
          path: simg2img-*

  # Create GitHub Release with all binaries
  create-release:
    needs: release
    if: startsWith(github.ref, 'refs/tags/')
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/download-artifact@v4
        with:
          pattern: simg2img-*
          merge-multiple: true

      - name: Generate checksums
        run: sha256sum simg2img-* > simg2img_sha256sums.txt

      - uses: softprops/action-gh-release@v2
        with:
          files: |
            simg2img-*
            simg2img_sha256sums.txt
          generate_release_notes: true
